version: "3.9"

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
      args:
        RELEASE_SHA: ${RELEASE_SHA:-unknown}
    restart: always
    expose:
      - "80"
    env_file:
      - .env.prod
    depends_on:
      - redis
    command: /start.sh

  celery:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    restart: always
    command: celery -A app.celery_worker.tasks worker --loglevel=info --concurrency=4
    env_file:
      - .env.prod
    depends_on:
      - redis

  celery-beat:
    build:
      context: .
      dockerfile: Dockerfile
      target: production
    restart: always
    command: celery -A app.celery_worker.tasks beat --loglevel=info
    env_file:
      - .env.prod
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    restart: always
    volumes:
      - redis_data:/data

  nginx:
    image: nginx:alpine
    restart: always
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - /opt/tam-api/certbot/www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    depends_on:
      - api

  certbot:
    image: certbot/certbot
    volumes:
      - /opt/tam-api/certbot/www:/var/www/certbot
      - certbot_conf:/etc/letsencrypt

volumes:
  redis_data:
  certbot_www:
  certbot_conf:
